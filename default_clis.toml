# Council — built-in CLI registry (v0.4).
#
# Users can override or extend this in `<platform-config-dir>/council/clis.toml`.
# On Windows: %APPDATA%\Council\clis.toml
# On macOS:   ~/Library/Application Support/Council/clis.toml
# On Linux:   ~/.config/Council/clis.toml
#
# Each [[cli]] entry is validated by council.registry.CLIEntry at load time.
# Argv is always an array — never a shell string — to avoid escaping issues.
#
# Placeholders in `command` / `resume_command`:
#   "{options}"      → spawn.apply_options() splices option tokens here
#   "{prompt}"       → spawn._resolve_argv_with_prompt() substitutes the user prompt
#                      (argv mode only; stdin-mode CLIs strip this token if present)
#   "{session_id}"   → spawn substitutes the saved session id when resuming
#
# Session persistence (v0.4):
#   resume_command + session_id_pattern must be declared together or both omitted.
#   When Council has a saved session_id for a CLI in the current conversation, the
#   `resume_command` template is used instead of `command`. After every run, Council
#   parses stdout with `session_id_pattern` (one capture group) and saves the id for
#   the next turn.

# ---- Codex (OpenAI) -------------------------------------------------------

[[cli]]
name = "codex"
command = ["codex", "exec", "-", "--skip-git-repo-check", "{options}"]
resume_command = ["codex", "exec", "resume", "{session_id}", "-", "--skip-git-repo-check", "{options}"]
session_id_pattern = "[Ss]ession\\s*(?:id|ID|Id)\\s*[:=]\\s*([0-9a-fA-F-]{8,})"
invocation_mode = "stdin"
headless_supported = true
experimental = false
description = "OpenAI Codex CLI — requires ChatGPT Plus/Team/Business."
homepage = "https://developers.openai.com/codex/cli"

[[cli.options_schema]]
name = "model"
type = "enum"
choices = ["gpt-5.4", "gpt-5.5"]
default = "gpt-5.4"
argv = ["--model", "{value}"]
description = "Model variant."

[[cli.options_schema]]
name = "reasoning"
type = "enum"
choices = ["low", "medium", "high", "xhigh"]
default = "medium"
argv = ["--config", 'model_reasoning_effort="{value}"']
description = "Reasoning effort level."

[[cli.options_schema]]
name = "sandbox"
type = "enum"
choices = ["read-only", "workspace-write", "disabled"]
default = "read-only"
argv = ["--sandbox", "{value}"]
description = "Filesystem sandbox policy."

# ---- Claude (Anthropic) ---------------------------------------------------

[[cli]]
name = "claude"
command = ["claude", "{options}", "--print", "{prompt}"]
resume_command = ["claude", "--resume", "{session_id}", "{options}", "--print", "{prompt}"]
session_id_pattern = "(?:[Ss]ession[_\\s]?[Ii][Dd]|conversation[_\\s]?id)\\s*[:=]\\s*([0-9a-fA-F-]{8,})"
invocation_mode = "argv"
headless_supported = true
experimental = false
description = "Anthropic Claude Code CLI — requires Claude Pro or Max."
homepage = "https://code.claude.com/docs/en/cli-usage"

[[cli.options_schema]]
name = "model"
type = "enum"
choices = ["sonnet-4-5", "opus-4-7", "haiku-4-5"]
default = "sonnet-4-5"
argv = ["--model", "{value}"]
description = "Claude model."

[[cli.options_schema]]
name = "output_format"
type = "enum"
choices = ["text", "json", "stream-json"]
default = "text"
argv = ["--output-format", "{value}"]
description = "Reply format."

# ---- GitHub Copilot CLI ---------------------------------------------------

[[cli]]
name = "copilot"
command = ["copilot", "-sp", "{prompt}"]
resume_command = ["copilot", "--resume", "{session_id}", "-sp", "{prompt}"]
session_id_pattern = "(?:[Ss]ession\\s*[Ii][Dd]|--resume\\s+)([A-Za-z0-9-]{8,})"
invocation_mode = "argv"
headless_supported = true
experimental = false
description = "GitHub Copilot CLI (new standalone, NOT `gh copilot suggest`)."
homepage = "https://docs.github.com/en/copilot/how-tos/copilot-cli/cli-getting-started"

# (No documented per-conversation options yet — leave empty.)

# ---- Gemini (Google) ------------------------------------------------------

[[cli]]
name = "gemini"
command = ["gemini", "{options}", "-p", "{prompt}"]
resume_command = ["gemini", "--resume", "{session_id}", "{options}", "-p", "{prompt}"]
session_id_pattern = "(?:[Ss]ession\\s*[Ii][Dd]|--resume\\s+'?)([0-9a-fA-F-]{8,})"
invocation_mode = "argv"
headless_supported = true
experimental = false
description = "Google Gemini CLI — requires Google AI Pro or API key."
homepage = "https://google-gemini.github.io/gemini-cli/docs/cli/headless.html"

[[cli.options_schema]]
name = "model"
type = "enum"
choices = ["gemini-2.5-pro", "gemini-2.5-flash"]
default = "gemini-2.5-pro"
argv = ["--model", "{value}"]
description = "Gemini model."

[[cli.options_schema]]
name = "yolo"
type = "bool"
default = false
argv = ["--yolo"]
description = "Skip interactive confirmations."

