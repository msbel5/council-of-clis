name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -q

      - name: Import smoke test
        run: python -c "import server, modes; print('import ok')"

      - name: Server startup smoke test
        run: |
          python server.py &
          SERVER_PID=$!
          sleep 5
          curl -sf http://localhost:8765/ > /dev/null || (echo "server did not respond" && kill $SERVER_PID && exit 1)
          curl -sf http://localhost:8765/api/clis > /dev/null
          curl -sf http://localhost:8765/api/modes > /dev/null
          kill $SERVER_PID
          echo "smoke ok"

      - name: Secrets audit (no API keys committed)
        run: |
          if grep -rE '(sk-[a-zA-Z0-9_-]{20,}|gho_[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{20,})' \
               --include='*.py' --include='*.md' --include='*.toml' --include='*.json' \
               --exclude-dir=.venv --exclude-dir=.git .; then
            echo "potential secret found"
            exit 1
          fi
          echo "no secrets detected"
